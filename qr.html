<div class="container mt-2">
  <h1><i class="fa fa-arrow-left" style=" cursor: pointer;" aria-hidden="true" onclick="toogs('whatsch')"></i> QR Code
    Generator</h1>

  <input class="form-control" type="text" id="qr-input" placeholder="Enter text or URL">
  <br>
  <button id="generate-btn" class="btn btn-primary mb-5">Generate QR Code</button>
  <br>
  <center>
    <canvas id="qrcode"></canvas>
    <br>
    <button id="download-btn" class="btn btn-success">
      <i class="fa fa-download"></i> Download
    </button>
  </center>


</div>
<script>
  $(document).ready(function () {
    $("#download-btn").hide();
    $('#generate-btn').click(function () {
      const text = $('#qr-input').val().trim();

      if (!text) {
        alert('Please enter text or URL to generate a QR Code.');
        return;
      }

      const canvas = document.getElementById('qrcode');
      const context = canvas.getContext('2d');
      context.clearRect(0, 0, canvas.width, canvas.height);

      QRCode.toCanvas(canvas, text, {
        width: 200,
        margin: 2,
      }, function (error) {
        if (error) console.error(error);
      });
      $("#download-btn").show();
    });

    $('#download-btn').click(function () {
      const canvas = document.getElementById('qrcode');
      const link = document.createElement('a');
      link.download = 'qrcode.png';
      link.href = canvas.toDataURL();
      link.click();
    });
  });
</script>
