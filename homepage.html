<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToolSpark Dashboard</title>
  <link rel="shortcut icon" href="img/settings.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
  <script src="js/jquery.js"></script>
  <script src="js/encoder.js"></script>
  <script src="js/solidmac.js"></script>
  <script src="js/qrscript.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
    }
    .sidebar {
      width: 250px;
      height: 100vh;
      position: fixed;
      background: #343a40;
      color: white;
      padding-top: 20px;
    }
    .sidebar a {
      color: white;
      text-decoration: none;
      padding: 10px;
      display: block;
    }
    .sidebar a:hover {
      background: #495057;
    }
    .content {
      margin-left: 250px;
      padding: 20px;
    }
    .card {
      transition: transform 0.2s;
    }
    .card:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h4 class="text-center">ToolSpark</h4>
    <a href="#"><i class="fas fa-home"></i> Dashboard</a>
    <a href="#"><i class="fas fa-comment"></i> WhatsApp Chat Viewer</a>
    <a href="#"><i class="fas fa-lock"></i> Encrypt/Decrypt</a>
    <a href="#"><i class="fas fa-calculator"></i> BMI Calculator</a>
    <a href="#"><i class="fas fa-qrcode"></i> QR Code Generator</a>
  </div>

  <!-- Main Content -->
  <div class="content">
    <input id="f" type="datetime-local" class="form-control">
    
    <button id="extract">Extract</button>

    <p><strong>Date:</strong> <span id="date"></span></p>
    <p><strong>Time:</strong> <span id="time"></span></p>
  </div>
<script>
     $(document).ready(function(){
            $("#extract").click(function(){
                let dateTimeValue = $("#f").val();
                
                if (dateTimeValue) {
                    let [date, time] = dateTimeValue.split("T"); // Split by 'T'
                    $("#date").text(date);
                    $("#time").text(time);
                } else {
                    alert("Please select a date and time.");
                }
            });
        });
</script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
